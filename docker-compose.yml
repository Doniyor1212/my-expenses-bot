services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ./charts:/app/charts
    command: python main.py
  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    command: uvicorn app.web.main:app --host 0.0.0.0 --port 8000
